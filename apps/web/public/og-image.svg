<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Canopy — Chăm cây cùng AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2a1a"/>
      <stop offset="0.55" stop-color="#0b1f14"/>
      <stop offset="1" stop-color="#08160e"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="360" fill="url(#glow)"/>

  <!-- Badge -->
  <g transform="translate(96,150)">
    <rect width="132" height="132" rx="32" fill="url(#leaf)"/>
    <g fill="none" stroke="#ffffff" stroke-width="6.6" stroke-linecap="round" stroke-linejoin="round" transform="translate(28,28) scale(3.18)">
      <path d="M11 20A7 7 0 0 1 4 13C4 8 8 4 20 4c0 12-4 16-9 16Z"/>
      <path d="M4 20c3-5 6-8 10-9"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <text x="98" y="370" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="118" font-weight="800" fill="#ffffff" letter-spacing="-2">Canopy</text>
  <text x="100" y="448" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="52" font-weight="600" fill="#86efac">Chăm cây cùng AI</text>
  <text x="100" y="520" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="400" fill="#9fb3a6">Nhận diện cây · Chẩn đoán bệnh · Nhắc lịch chăm sóc</text>
</svg>
