# air hot-reload config for local dev (used by the docker `dev` stage).
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  full_bin = "./tmp/api"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "migrations"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
