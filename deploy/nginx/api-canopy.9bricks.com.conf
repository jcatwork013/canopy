# api-canopy.9bricks.com -> Go API container (127.0.0.1:18100)
server {
    listen 80;
    listen [::]:80;
    server_name api-canopy.9bricks.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-canopy.9bricks.com;

    ssl_certificate     /etc/ssl/canopy/fullchain.pem;
    ssl_certificate_key /etc/ssl/canopy/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow image uploads (KYC/plant photos in later phases).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:18100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/api-canopy.9bricks.com.access.log;
    error_log  /var/log/nginx/api-canopy.9bricks.com.error.log;
}
