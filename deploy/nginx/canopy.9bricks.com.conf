# canopy.9bricks.com -> web PWA container (127.0.0.1:13300)
server {
    listen 80;
    listen [::]:80;
    server_name canopy.9bricks.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name canopy.9bricks.com;

    ssl_certificate     /etc/ssl/canopy/fullchain.pem;
    ssl_certificate_key /etc/ssl/canopy/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Service worker + manifest must never be cached (prompt PWA updates).
    location = /sw.js               { proxy_pass http://127.0.0.1:13300; add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { proxy_pass http://127.0.0.1:13300; add_header Cache-Control "no-cache"; }

    location / {
        proxy_pass http://127.0.0.1:13300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/canopy.9bricks.com.access.log;
    error_log  /var/log/nginx/canopy.9bricks.com.error.log;
}
